  GOOGLE_CLIENT_SECRET: eW91ci1nb29nbGUtY2xpZW50LXNlY3JldA==  # your-google-client-secret
---
# TLS Secret for HTTPS (if using custom certificates)
apiVersion: v1
kind: Secret
metadata:
  name: meridian-tls
  namespace: meridian
  labels:
    app: meridian
type: kubernetes.io/tls
data:
  # Replace with your actual certificate and key
  tls.crt: LS0tLS1CRUdJTiBDRVJUSUZJQ0FURS0tLS0t...  # Base64 encoded certificate
  tls.key: LS0tLS1CRUdJTiBQUklWQVRFIEtFWS0tLS0t...  # Base64 encoded private key