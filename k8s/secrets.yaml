# Meridian Secrets - Production Environment
# Note: In production, use proper secret management (Vault, K8s secrets, etc.)
apiVersion: v1
kind: Secret
metadata:
  name: meridian-secrets
  namespace: meridian
  labels:
    app: meridian
type: Opaque
data:
  # Base64 encoded secrets (echo -n 'value' | base64)
  # Change these values in production!
  
  # Database credentials
  DB_PASSWORD: bWVyaWRpYW5fc2VjdXJlX3Bhc3N3b3Jk  # meridian_secure_password
  DATABASE_URL: cG9zdGdyZXNxbDovL21lcmlkaWFuOm1lcmlkaWFuX3NlY3VyZV9wYXNzd29yZEBwb3N0Z3Jlcy1zZXJ2aWNlOjU0MzIvbWVyaWRpYW4=  # postgresql://meridian:meridian_secure_password@postgres-service:5432/meridian
  
  # JWT Secret (must be at least 32 characters)
  JWT_SECRET: eW91ci1zdXBlci1zZWN1cmUtand0LXNlY3JldC1taW4tMzItY2hhcnMtZm9yLXByb2R1Y3Rpb24=  # your-super-secure-jwt-secret-min-32-chars-for-production
  
  # Redis connection
  REDIS_URL: cmVkaXM6Ly9yZWRpcy1zZXJ2aWNlOjYzNzk=  # redis://redis-service:6379
  
  # CORS origins (production domains)
  CORS_ORIGINS: aHR0cHM6Ly95b3VyZG9tYWluLmNvbSxodHRwczovL2FwaS55b3VyZG9tYWluLmNvbQ==  # https://yourdomain.com,https://api.yourdomain.com
  
  # VAPID keys for push notifications (generate with: npx web-push generate-vapid-keys)
  VAPID_PUBLIC_KEY: eW91ci12YXBpZC1wdWJsaWMta2V5LWhlcmU=  # your-vapid-public-key-here
  VAPID_PRIVATE_KEY: eW91ci12YXBpZC1wcml2YXRlLWtleS1oZXJl  # your-vapid-private-key-here
  VAPID_SUBJECT: bWFpbHRvOm5vLXJlcGx5QG1lcmlkaWFuLmFwcA==  # mailto:no-reply@meridian.app
  
  # Email configuration (optional)
  EMAIL_HOST: c210cC5nbWFpbC5jb20=  # smtp.gmail.com
  EMAIL_PORT: NTg3  # 587
  EMAIL_USER: eW91ci1lbWFpbEBnbWFpbC5jb20=  # your-email@gmail.com
  EMAIL_PASS: eW91ci1hcHAtcGFzc3dvcmQ=  # your-app-password
  EMAIL_FROM: eW91ci1lbWFpbEBnbWFpbC5jb20=  # your-email@gmail.com
  
