openapi: 3.0.0
info:
  title: Milestone API
  version: 1.0.0
  description: API documentation for project milestone management.
servers:
  - url: /api
paths:
  /project/{projectId}/milestones:
    get:
      summary: List milestones for a project
      parameters:
        - in: path
          name: projectId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: List of milestones
          content:
            application/json:
              schema:
                type: object
                properties:
                  milestones:
                    type: array
                    items:
                      $ref: '#/components/schemas/Milestone'
                  stats:
                    type: object
        '401':
          description: Unauthorized
    post:
      summary: Create a milestone
      parameters:
        - in: path
          name: projectId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MilestoneCreateRequest'
      responses:
        '200':
          description: Created milestone
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Milestone'
        '400':
          description: Validation error
        '401':
          description: Unauthorized
  /milestone/{milestoneId}:
    patch:
      summary: Update a milestone
      parameters:
        - in: path
          name: milestoneId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MilestoneUpdateRequest'
      responses:
        '200':
          description: Updated milestone
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Milestone'
        '400':
          description: Validation error
        '401':
          description: Unauthorized
        '404':
          description: Not found
    delete:
      summary: Delete a milestone
      parameters:
        - in: path
          name: milestoneId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Milestone deleted
        '401':
          description: Unauthorized
        '404':
          description: Not found
components:
  schemas:
    Milestone:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        type:
          type: string
        status:
          type: string
        dueDate:
          type: string
          format: date-time
        completedDate:
          type: string
          format: date-time
        progress:
          type: integer
        projectId:
          type: string
        riskLevel:
          type: string
        riskDescription:
          type: string
        dependencyTaskIds:
          type: array
          items:
            type: string
        stakeholderIds:
          type: array
          items:
            type: string
        createdBy:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    MilestoneCreateRequest:
      type: object
      required:
        - title
        - type
        - dueDate
        - projectId
      properties:
        title:
          type: string
        description:
          type: string
        type:
          type: string
        dueDate:
          type: string
          format: date-time
        projectId:
          type: string
        riskLevel:
          type: string
        riskDescription:
          type: string
        dependencyTaskIds:
          type: array
          items:
            type: string
        stakeholderIds:
          type: array
          items:
            type: string
    MilestoneUpdateRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        type:
          type: string
        status:
          type: string
        dueDate:
          type: string
          format: date-time
        riskLevel:
          type: string
        riskDescription:
          type: string
        dependencyTaskIds:
          type: array
          items:
            type: string
        stakeholderIds:
          type: array
          items:
            type: string
        progress:
          type: integer 