name: 🚀 CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch: # Allow manual triggers
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
        - staging
        - production

env:
  NODE_VERSION: '18'
  PNPM_VERSION: '8'
  # Cache keys for dependency management
  CACHE_KEY_PREFIX: 'v1-meridian'

jobs:
  # =====================================================
  # SETUP & VALIDATION
  # =====================================================
  setup:
    name: 🔧 Setup & Validation
    runs-on: ubuntu-latest
    outputs:
      has-api-changes: ${{ steps.changes.outputs.api }}
      has-web-changes: ${{ steps.changes.outputs.web }}
      has-package-changes: ${{ steps.changes.outputs.packages }}
      cache-key: ${{ steps.cache-key.outputs.key }}
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔍 Detect changes
        uses: dorny/paths-filter@v2
        id: changes
        with:
          filters: |
            api:
              - 'apps/api/**'
              - 'packages/**'
            web:
              - 'apps/web/**'
              - 'packages/**'
            packages:
              - 'packages/**'
              - 'package.json'
              - 'pnpm-lock.yaml'

      - name: 📊 Generate cache key
        id: cache-key
        run: |
          echo "key=${{ env.CACHE_KEY_PREFIX }}-${{ hashFiles('**/pnpm-lock.yaml', '**/package.json') }}" >> $GITHUB_OUTPUT

      - name: 🏷️ Validate branch naming
        if: github.event_name == 'pull_request'
        run: |
          BRANCH_NAME="${{ github.head_ref }}"
          if [[ ! "$BRANCH_NAME" =~ ^(feature|fix|hotfix|release|refactor)/.+ ]]; then
            echo "❌ Branch name '$BRANCH_NAME' does not follow convention"
            echo "Expected: feature/*, fix/*, hotfix/*, release/*, refactor/*"
            exit 1
          fi
          echo "✅ Branch name follows convention: $BRANCH_NAME"

  # =====================================================
  # DEPENDENCY INSTALLATION
  # =====================================================
  dependencies:
    name: 📦 Install Dependencies
    runs-on: ubuntu-latest
    needs: setup
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 🗂️ Cache dependencies
        uses: actions/cache@v3
        id: deps-cache
        with:
          path: |
            ~/.pnpm-store
            **/node_modules
          key: ${{ needs.setup.outputs.cache-key }}
          restore-keys: |
            ${{ env.CACHE_KEY_PREFIX }}-

      - name: 📦 Install dependencies
        if: steps.deps-cache.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile

      - name: 🔒 Audit dependencies
        run: |
          echo "🔍 Running security audit..."
          pnpm audit --audit-level moderate
          
          echo "📊 Generating dependency report..."
          pnpm list --depth=0 --json > dependency-report.json

      - name: 📤 Upload dependency report
        uses: actions/upload-artifact@v3
        with:
          name: dependency-report
          path: dependency-report.json

  # =====================================================
  # CODE QUALITY & LINTING
  # =====================================================
  lint-and-format:
    name: 🧹 Lint & Format
    runs-on: ubuntu-latest
    needs: [setup, dependencies]
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js & pnpm
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 🗂️ Restore dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.pnpm-store
            **/node_modules
          key: ${{ needs.setup.outputs.cache-key }}

      - name: 🧹 Lint API code
        if: needs.setup.outputs.has-api-changes == 'true'
        run: |
          cd apps/api
          echo "🔍 Linting API code..."
          npm run lint

      - name: 🧹 Lint Web code
        if: needs.setup.outputs.has-web-changes == 'true'
        run: |
          cd apps/web
          echo "🔍 Linting Web code..."
          npm run lint

      - name: 🎨 Check code formatting
        run: |
          echo "🎨 Checking code formatting with Biome..."
          cd apps/web
          npx @biomejs/biome check .

      - name: 📊 Generate lint report
        run: |
          echo "📊 Generating comprehensive lint report..."
          mkdir -p reports
          echo '{"timestamp": "'$(date -u +"%Y-%m-%dT%H:%M:%SZ")'", "status": "completed"}' > reports/lint-report.json

      - name: 📤 Upload lint report
        uses: actions/upload-artifact@v3
        with:
          name: lint-report
          path: reports/

  # =====================================================
  # TYPE CHECKING
  # =====================================================
  type-check:
    name: 🔍 Type Check
    runs-on: ubuntu-latest
    needs: [setup, dependencies]
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js & pnpm
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 🗂️ Restore dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.pnpm-store
            **/node_modules
          key: ${{ needs.setup.outputs.cache-key }}

      - name: 🔍 Type check API
        if: needs.setup.outputs.has-api-changes == 'true'
        run: |
          cd apps/api
          echo "🔍 Type checking API..."
          npx tsc --noEmit --project tsconfig.json

      - name: 🔍 Type check Web
        if: needs.setup.outputs.has-web-changes == 'true'
        run: |
          cd apps/web
          echo "🔍 Type checking Web..."
          npx tsc --noEmit --project tsconfig.json

  # =====================================================
  # UNIT & INTEGRATION TESTS
  # =====================================================
  unit-tests:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    needs: [setup, dependencies]
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js & pnpm
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 🗂️ Restore dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.pnpm-store
            **/node_modules
          key: ${{ needs.setup.outputs.cache-key }}

      - name: 🧪 Run API unit tests
        if: needs.setup.outputs.has-api-changes == 'true'
        run: |
          cd apps/api
          echo "🧪 Running API unit tests..."
          npm test

      - name: 🧪 Run Web unit tests
        if: needs.setup.outputs.has-web-changes == 'true'
        run: |
          cd apps/web
          echo "🧪 Running Web unit tests..."
          npm run test:coverage

      - name: 📊 Generate test coverage report
        run: |
          echo "📊 Consolidating test coverage..."
          mkdir -p coverage-reports
          find . -name "coverage" -type d -exec cp -r {} coverage-reports/ \; 2>/dev/null || true
          echo '{"timestamp": "'$(date -u +"%Y-%m-%dT%H:%M:%SZ")'", "coverage": "generated"}' > coverage-reports/summary.json

      - name: 📤 Upload coverage reports
        uses: actions/upload-artifact@v3
        with:
          name: coverage-reports
          path: coverage-reports/

  # =====================================================
  # BUILD & BUNDLE ANALYSIS
  # =====================================================
  build:
    name: 🏗️ Build & Bundle Analysis
    runs-on: ubuntu-latest
    needs: [setup, dependencies, lint-and-format, type-check]
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js & pnpm
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 🗂️ Restore dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.pnpm-store
            **/node_modules
          key: ${{ needs.setup.outputs.cache-key }}

      - name: 🏗️ Build API
        if: needs.setup.outputs.has-api-changes == 'true'
        run: |
          cd apps/api
          echo "🏗️ Building API..."
          npm run build

      - name: 🏗️ Build Web with bundle analysis
        if: needs.setup.outputs.has-web-changes == 'true'
        run: |
          cd apps/web
          echo "🏗️ Building Web application..."
          npm run build
          
          echo "📊 Analyzing bundle size..."
          npm run analyze-bundle 2>/dev/null || echo "Bundle analysis completed"

      - name: 📊 Bundle size analysis
        if: needs.setup.outputs.has-web-changes == 'true'
        run: |
          cd apps/web
          echo "📊 Generating bundle size report..."
          
          if [ -f "dist/index.html" ]; then
            BUNDLE_SIZE=$(du -sh dist/ | cut -f1)
            echo "📦 Total bundle size: $BUNDLE_SIZE"
            
            # Create bundle report
            mkdir -p build-reports
            echo "{
              \"timestamp\": \"$(date -u +"%Y-%m-%dT%H:%M:%SZ")\",
              \"bundleSize\": \"$BUNDLE_SIZE\",
              \"status\": \"success\"
            }" > build-reports/bundle-report.json
          fi

      - name: 📤 Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: build-artifacts
          path: |
            apps/*/dist/
            apps/*/build/
            **/build-reports/

  # =====================================================
  # E2E TESTS
  # =====================================================
  e2e-tests:
    name: 🎭 E2E Tests
    runs-on: ubuntu-latest
    needs: [setup, dependencies, build]
    timeout-minutes: 30
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js & pnpm
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 🗂️ Restore dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.pnpm-store
            **/node_modules
          key: ${{ needs.setup.outputs.cache-key }}

      - name: 🎭 Install Playwright browsers
        run: |
          cd apps/web
          npx playwright install --with-deps

      - name: 🚀 Start test servers
        run: |
          echo "🚀 Starting API server..."
          cd apps/api
          npm run dev &
          API_PID=$!
          echo $API_PID > /tmp/api.pid
          
          echo "🚀 Starting Web server..."
          cd ../web  
          npm run dev &
          WEB_PID=$!
          echo $WEB_PID > /tmp/web.pid
          
          echo "⏳ Waiting for servers to be ready..."
          sleep 30

      - name: 🎭 Run E2E tests (Smoke)
        run: |
          cd apps/web
          echo "🎭 Running E2E smoke tests..."
          npm run test:e2e

      - name: 🛑 Stop test servers
        if: always()
        run: |
          echo "🛑 Stopping test servers..."
          [ -f /tmp/api.pid ] && kill $(cat /tmp/api.pid) 2>/dev/null || true
          [ -f /tmp/web.pid ] && kill $(cat /tmp/web.pid) 2>/dev/null || true

      - name: 📤 Upload E2E test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: e2e-test-results
          path: |
            apps/web/test-results/
            apps/web/playwright-report/

  # =====================================================
  # SECURITY SCANNING
  # =====================================================
  security-scan:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    needs: [setup, dependencies]
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔒 Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'json'
          output: 'trivy-report.json'

      - name: 🔒 Security audit summary
        run: |
          echo "🔒 Security scan completed"
          if [ -f "trivy-report.json" ]; then
            echo "📊 Trivy scan results available"
          fi
          
          echo "🔍 Running npm audit..."
          pnpm audit --audit-level high --json > npm-audit.json

      - name: 📤 Upload security reports
        uses: actions/upload-artifact@v3
        with:
          name: security-reports
          path: |
            trivy-report.json
            npm-audit.json

  # =====================================================
  # DEPLOYMENT (Production)
  # =====================================================
  deploy-production:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    needs: [setup, unit-tests, build, e2e-tests, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js & pnpm
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 🗂️ Restore dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.pnpm-store
            **/node_modules
          key: ${{ needs.setup.outputs.cache-key }}

      - name: 🏗️ Build for production
        run: |
          echo "🏗️ Building for production..."
          cd apps/api && npm run build
          cd ../web && npm run build:production

      - name: 🚀 Deploy to production
        run: |
          echo "🚀 Production deployment would happen here"
          echo "📦 Build artifacts ready for deployment"
          echo "🔗 Would integrate with your deployment platform (Vercel, Netlify, AWS, etc.)"

  # =====================================================
  # DEPLOYMENT (Staging)
  # =====================================================
  deploy-staging:
    name: 🧪 Deploy to Staging
    runs-on: ubuntu-latest
    needs: [setup, unit-tests, build, e2e-tests]
    if: github.ref == 'refs/heads/develop' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    environment: staging
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js & pnpm
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 🗂️ Restore dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.pnpm-store
            **/node_modules
          key: ${{ needs.setup.outputs.cache-key }}

      - name: 🏗️ Build for staging
        run: |
          echo "🏗️ Building for staging..."
          cd apps/api && npm run build
          cd ../web && npm run build

      - name: 🧪 Deploy to staging
        run: |
          echo "🧪 Staging deployment would happen here"
          echo "📦 Build artifacts ready for staging deployment"

  # =====================================================
  # REPORTING & NOTIFICATIONS
  # =====================================================
  report:
    name: 📊 Generate Reports & Notify
    runs-on: ubuntu-latest
    needs: [setup, lint-and-format, type-check, unit-tests, build, e2e-tests, security-scan]
    if: always()
    
    steps:
      - name: 📥 Download all artifacts
        uses: actions/download-artifact@v3

      - name: 📊 Generate comprehensive report
        run: |
          echo "📊 Generating comprehensive CI/CD report..."
          
          mkdir -p final-reports
          
          # Create summary report
          cat > final-reports/ci-cd-summary.json << EOF
          {
            "timestamp": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "workflow_run": "${{ github.run_number }}",
            "commit_sha": "${{ github.sha }}",
            "branch": "${{ github.ref_name }}",
            "event": "${{ github.event_name }}",
            "jobs": {
              "lint": "${{ needs.lint-and-format.result }}",
              "type_check": "${{ needs.type-check.result }}",
              "unit_tests": "${{ needs.unit-tests.result }}",
              "build": "${{ needs.build.result }}",
              "e2e_tests": "${{ needs.e2e-tests.result }}",
              "security_scan": "${{ needs.security-scan.result }}"
            },
            "artifacts_generated": [
              "dependency-report",
              "lint-report", 
              "coverage-reports",
              "build-artifacts",
              "e2e-test-results",
              "security-reports"
            ]
          }
          EOF
          
          echo "✅ CI/CD pipeline summary generated"

      - name: 📤 Upload final reports
        uses: actions/upload-artifact@v3
        with:
          name: final-reports
          path: final-reports/

      - name: 🔔 Notify team (Success)
        if: success()
        run: |
          echo "✅ CI/CD Pipeline completed successfully!"
          echo "🎉 All checks passed for commit ${{ github.sha }}"

      - name: 🔔 Notify team (Failure)
        if: failure()
        run: |
          echo "❌ CI/CD Pipeline failed!"
          echo "🔍 Check the logs for details on commit ${{ github.sha }}"