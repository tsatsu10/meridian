# Full Playwright suite under apps/web/e2e (API + Vite, Chromium).
# Use workflow_dispatch or PR label `run-e2e-full`. Requires Postgres.

name: Web E2E full

on:
  workflow_dispatch:
  pull_request:
    types: [labeled, synchronize, opened, reopened]
    paths:
      - "apps/web/e2e/**"
      - "apps/web/playwright.config.ts"
      - "apps/web/scripts/run-e2e-full-app.mjs"
      - "apps/api/**"
      - ".github/workflows/web-e2e-full.yml"

concurrency:
  group: web-e2e-full-${{ github.ref }}
  cancel-in-progress: true

jobs:
  full:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'run-e2e-full'))
    runs-on: ubuntu-latest
    timeout-minutes: 45

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: meridian
          POSTGRES_PASSWORD: meridian
          POSTGRES_DB: meridian_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U meridian -d meridian_e2e"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://meridian:meridian@localhost:5432/meridian_e2e
      JWT_SECRET: ci-e2e-jwt-secret-must-be-at-least-32-characters
      FRONTEND_URL: http://localhost:5174
      PLAYWRIGHT_START_API: "1"
      CI: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install API dependencies
        working-directory: apps/api
        run: npm ci || npm install

      - name: Apply database schema
        working-directory: apps/api
        run: npx drizzle-kit push --force

      - name: Point web at local @meridian/libs
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = 'apps/web/package.json';
          const p = JSON.parse(fs.readFileSync(path, 'utf8'));
          p.dependencies = p.dependencies || {};
          p.dependencies['@meridian/libs'] = 'file:../../packages/libs';
          fs.writeFileSync(path, JSON.stringify(p, null, 2) + '\n');
          NODE

      - name: Install web dependencies
        working-directory: apps/web
        run: npm install

      - name: Install Playwright Chromium
        working-directory: apps/web
        run: npx playwright install chromium --with-deps

      - name: Run full E2E suite
        working-directory: apps/web
        run: npm run test:e2e:full-app

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-full
          path: apps/web/playwright-report/
          retention-days: 7
