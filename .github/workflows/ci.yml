name: Code quality

on:
  push:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  quality:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Biome
        uses: biomejs/setup-biome@v2
        with:
          version: latest
      # Scope to application sources. Non-blocking until Biome backlog is cleared (see job log).
      - name: Run Biome
        continue-on-error: true
        run: biome ci apps/web apps/api packages/libs
