name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lint:
    name: Lint (Biome)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Biome
        uses: biomejs/setup-biome@v2
        with:
          version: latest
      # BLOCKING ratchet: every rule at error severity is at zero violations.
      # The remaining backlog is downgraded to "warn" in biome.json (noExplicitAny,
      # noArrayIndexKey, useExhaustiveDependencies, noStaticOnlyClass, the a11y
      # trio, and api-only noNonNullAssertion) — burn those down per-rule, then
      # promote them back to error.
      - name: Run Biome
        run: biome ci apps/web apps/api packages/libs

  typecheck-and-test:
    name: Typecheck, test, build
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install deps (no scripts)
        run: npm ci --ignore-scripts

      # Blocking: the error backlog was cleared to zero (was 973).
      - name: Typecheck api
        run: npm run typecheck --workspace=@meridian/api

      # NOTE: apps/web/tsconfig.json is a solution-style config with files:[], so a bare
      # `tsc --noEmit` checks nothing. Point at tsconfig.app.json for the real check.
      # Blocking: the error backlog was cleared to zero (was ~3.2k).
      - name: Typecheck web
        working-directory: apps/web
        run: npx tsc --noEmit -p tsconfig.app.json

      # Blocking: suite is green (DB-integration suites skip when no test DB).
      - name: Unit tests (api)
        run: npm run test:run --workspace=@meridian/api

      # Blocking: suite is green (76 files, ~1k tests, <2 min after the
      # runaway-test fix).
      - name: Unit tests (web)
        run: npm run test:unit --workspace=@meridian/web

      - name: Build api
        run: npm run build --workspace=@meridian/api

      - name: Build web
        working-directory: apps/web
        run: npx vite build
