# Dependabot configuration for automated dependency updates
# See: https://docs.github.com/en/code-security/dependabot

version: 2
updates:
  # Enable dependency updates for root package.json
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 10
    reviewers:
      - "meridian-team"
    assignees:
      - "meridian-team"
    labels:
      - "dependencies"
      - "automated"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      # Group all patch and minor updates together
      production-dependencies:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # API dependencies
  - package-ecosystem: "npm"
    directory: "/apps/api"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    reviewers:
      - "meridian-team"
    labels:
      - "dependencies"
      - "api"
      - "automated"
    commit-message:
      prefix: "chore(deps-api)"
    versioning-strategy: increase

  # Web dependencies
  - package-ecosystem: "npm"
    directory: "/apps/web"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    reviewers:
      - "meridian-team"
    labels:
      - "dependencies"
      - "web"
      - "automated"
    commit-message:
      prefix: "chore(deps-web)"
    versioning-strategy: increase

  # Docs dependencies
  - package-ecosystem: "npm"
    directory: "/apps/docs"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "docs"
      - "automated"
    commit-message:
      prefix: "chore(deps-docs)"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 2
    labels:
      - "dependencies"
      - "github-actions"
      - "automated"
    commit-message:
      prefix: "chore(deps-actions)"

# Ignore specific dependencies (if needed)
# ignore:
#   - dependency-name: "lodash"
#     versions: ["4.x"]

# Auto-merge settings for low-risk updates
# Requires GitHub Actions workflow to handle auto-merge
# See: .github/workflows/dependabot-auto-merge.yml
