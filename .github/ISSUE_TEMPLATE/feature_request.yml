name: ✨ Feature Request
description: Suggest a new feature or enhancement for Meridian
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a new feature! Please fill out the information below to help us understand your request.

  - type: textarea
    id: summary
    attributes:
      label: 🎯 Feature Summary
      description: A brief, clear description of the feature you'd like to see
      placeholder: Describe the feature in one or two sentences
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: 🤔 Problem Statement
      description: What problem does this feature solve? What need does it address?
      placeholder: Describe the problem this feature would solve
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 💡 Proposed Solution
      description: Describe your ideal solution for this problem
      placeholder: Describe how you envision this feature working
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 🔄 Alternatives Considered
      description: Have you considered any alternative solutions or workarounds?
      placeholder: Describe any alternative solutions you've thought about

  - type: dropdown
    id: area
    attributes:
      label: 📍 Feature Area
      description: Which part of the application would this feature affect?
      options:
        - Dashboard
        - Project Management
        - Task Management
        - Communication/Chat
        - User Management
        - Settings
        - Authentication
        - API
        - Mobile/Responsive
        - Analytics
        - Integrations
        - Other
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: ⭐ Priority
      description: How important is this feature to you?
      options:
        - Low - Nice to have
        - Medium - Would improve workflow
        - High - Important for productivity
        - Critical - Blocking current workflow
    validations:
      required: true

  - type: dropdown
    id: user_type
    attributes:
      label: 👥 User Type
      description: What type of user would benefit from this feature?
      multiple: true
      options:
        - Individual users
        - Team members
        - Project managers
        - Administrators
        - All users

  - type: textarea
    id: use_cases
    attributes:
      label: 📋 Use Cases
      description: Describe specific scenarios where this feature would be used
      placeholder: |
        1. When a user wants to...
        2. A team needs to...
        3. Project managers could...

  - type: textarea
    id: mockups
    attributes:
      label: 🎨 Mockups/Wireframes
      description: If you have any visual ideas, mockups, or examples, please share them
      placeholder: Drag and drop images here, or provide links to mockups

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: ✅ Acceptance Criteria
      description: What would make this feature complete and ready for use?
      placeholder: |
        - [ ] User can do X
        - [ ] System responds with Y
        - [ ] Feature handles Z edge case

  - type: dropdown
    id: complexity
    attributes:
      label: 🔧 Estimated Complexity
      description: How complex do you think this feature might be to implement?
      options:
        - Simple - Small UI change or minor functionality
        - Medium - New component or moderate backend work
        - Complex - Major feature requiring significant development
        - Unknown - Not sure about complexity

  - type: checkboxes
    id: impact
    attributes:
      label: 📊 Potential Impact
      description: What areas might this feature impact? (Check all that apply)
      options:
        - label: User experience
        - label: Performance
        - label: Security
        - label: Database schema
        - label: API changes
        - label: Mobile compatibility
        - label: Third-party integrations

  - type: textarea
    id: additional
    attributes:
      label: 📋 Additional Context
      description: Any other information, examples, or context that would be helpful
      placeholder: Add any other relevant information

  - type: checkboxes
    id: terms
    attributes:
      label: ✅ Confirmation
      description: Please confirm the following
      options:
        - label: I have searched existing issues to make sure this is not a duplicate
          required: true
        - label: I have provided clear use cases and acceptance criteria
          required: true
        - label: This feature would benefit multiple users, not just my specific use case
          required: true